<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>Global Web Production | Digital Transformation & Technology Solutions</title>
    <meta name="description" content="Global Web Production delivers enterprise-grade digital transformation, AEM cloud migration, AI-powered solutions, and cutting-edge web technology services worldwide." />
    <meta name="robots" content="index, follow" />

    <!-- Preconnect to external origins used by the app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- Preload Critical LCP Asset -->
    <link rel="preload" href="/home/digital-app-innovation-banner-image.jpg" as="image" fetchpriority="high" />

    <!-- Critical fonts & icons — load asynchronously to eliminate render blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&family=Noto+Serif:wght@400;700&family=Outfit:wght@100;300;400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&family=Noto+Serif:wght@400;700&family=Outfit:wght@100;300;400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" media="print" onload="this.media='all'" />
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&family=Noto+Serif:wght@400;700&family=Outfit:wght@100;300;400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    </noscript>

    <!-- Inline Critical Above-the-Fold CSS -->
    <style>
      :root {
        --bg-deep: #020617;
      }
      html, body {
        background-color: var(--bg-deep);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: 'Outfit', sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      /* Prevent white flash on heavy hero background */
      section.relative.overflow-hidden.w-full.h-\[85vh\] {
        background-color: #050B1C !important;
      }
    </style>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
